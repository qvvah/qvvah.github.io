<script type="text/javascript">
    var i=0, r=m.rows;
    function s(n) { //like old multicart
        if (n === i) return;
        Beep();
        r[i].cells[0].innerText = '';
        i = n;
        r[i].cells[0].innerText = '➔';
    };
    function go() {
        var link = r[i].getElementsByTagName('a')[0];
        if (link) {
            window.location.href = link.href;
        }
    };

    var snd = new Audio('./js/beep.mp3'); //so oldskul!
    function Beep() {
        snd.currentTime = 0;
        snd.play().catch(function(e){});
    };

    document.onkeydown = function() { //for PC
        var k = event.keyCode;
        if (k == 40) s((i + 1) % r.length);
        if (k == 38) s((i - 1 + r.length) % r.length);
        if (k == 13) go();
    };
    m.onmouseover = function() { //for PC too
        var row = event.srcElement;
        while (row && row.tagName != 'tr') row = row.parentNode;
        if (row && row.rowIndex != null) s(row.rowIndex);
    };

    var ts; //= touch support // 40 is THRES
    document.ontouchstart = function(e) { ts = e.touches[0].clientY; };
    document.ontouchend = function(e) {
        var te = e.changedTouches[0].clientY;
        if (Math.abs(ts - te) > 40) s((i + (ts > te ? 1 : -1) + r.length) % r.length);
    };

</script>
<script type="text/javascript" src="./js/glitchy.js"></script>
